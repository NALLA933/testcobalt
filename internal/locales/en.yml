# 🚫 Assistant Restricted / Banned
assistant_restricted_warning: |
  ⚠️ <b>ᴀꜱꜱɪꜱᴛᴀɴᴛ ʀᴇꜱᴛʀɪᴄᴛᴇᴅ</b>

  ᴛʜᴇ ᴀꜱꜱɪꜱᴛᴀɴᴛ {assistant} (ɪᴅ: <code>{id}</code>) ʜᴀꜱ ʙᴇᴇɴ <b>ʙᴀɴɴᴇᴅ</b> ᴏʀ ʀᴇꜱᴛʀɪᴄᴛᴇᴅ ɪɴ ᴛʜɪꜱ ᴄʜᴀᴛ.
  ɪ ᴄᴀɴɴᴏᴛ ᴘʟᴀʏ ᴍᴜꜱɪᴄ, ᴍᴀɴᴀɢᴇ ᴛʜᴇ ꞯᴜᴇᴜᴇ, ᴏʀ ᴄʟᴇᴀɴ ᴜᴘ ᴛʀᴀᴄᴋꜱ ᴡʜɪʟᴇ ᴛʜɪꜱ ᴄᴏɴᴛɪɴᴜᴇꜱ.

  <i>ᴜɴʙᴀɴ ᴛʜᴇ ᴀꜱꜱɪꜱᴛᴀɴᴛ ᴛᴏ ʀᴇꜱᴛᴏʀᴇ ᴀʟʟ ᴍᴜꜱɪᴄ ꜰᴇᴀᴛᴜʀᴇꜱ 🎵</i>

autoplay_usage: |
  ⚙️ <b>ᴀᴜᴛᴏᴘʟᴀʏ ᴄᴏɴᴛʀᴏʟ</b>

  <i>ᴡʜᴇɴ ᴇɴᴀʙʟᴇᴅ, ᴛʜᴇ ʙᴏᴛ ᴡɪʟʟ ᴀᴜᴛᴏᴍᴀᴛɪᴄᴀʟʟʏ ᴘʟᴀʏ ʀᴇᴄᴏᴍᴍᴇɴᴅᴇᴅ ᴛʀᴀᴄᴋꜱ ᴡʜᴇɴ ᴛʜᴇ ꞯᴜᴇᴜᴇ ɪꜱ ᴇᴍᴘᴛʏ.</i>
  
  ᴜꜱᴀɢᴇ: {cmd} [ᴇɴᴀʙʟᴇ|ᴅɪꜱᴀʙʟᴇ]

  <i><b>ᴄᴜʀʀᴇɴᴛ ꜱᴛᴀᴛᴇ:</b> {action}</i>

autoplay_updated: |
  ⚙️ <b>ᴀᴜᴛᴏᴘʟᴀʏ ᴜᴘᴅᴀᴛᴇᴅ</b>
  
  <i>ᴀᴜᴛᴏᴘʟᴀʏ ʜᴀꜱ ʙᴇᴇɴ <b>{action}</b> ʙʏ {user}.</i>


