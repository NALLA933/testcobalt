  <b>ᴄᴏᴍᴍᴀɴᴅꜱ:</b>
  <b>/ᴀᴅᴅꜱᴜᴅᴏ</b> - ᴀᴅᴅ ᴀ ɴᴇᴡ ᴜꜱᴇʀ ᴛᴏ ʙᴏᴛ'ꜱ ꜱᴜᴅᴏʟɪꜱᴛ
  <b>/ᴅᴇʟꜱᴜᴅᴏ</b> - ʀᴇᴍᴏᴠᴇ ᴀ ᴜꜱᴇʀ ꜰʀᴏᴍ ʙᴏᴛ'ꜱ ꜱᴜᴅᴏʟɪꜱᴛ
  <b>/ᴇᴠᴀʟ</b> - ᴇxᴇᴄᴜᴛᴇ ɢᴏ ᴄᴏᴅᴇ ꜱɴɪᴘᴘᴇᴛꜱ
  <b>/ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ</b> — ᴍᴀɴᴀɢᴇ ᴛʜᴇ ʙᴏᴛ’ꜱ ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ ᴍᴏᴅᴇ
  <b>/ʀᴇꜱᴛᴀʀᴛ</b> — ʀᴇꜱᴛᴀʀᴛ ᴛʜᴇ ʙᴏᴛ
  <b>/ꜱʜ</b> - ʀᴜɴ ꜱʜᴇʟʟ ᴄᴏᴍᴍᴀɴᴅꜱ

help_sudo: |
  ⚡ <b>ꜱᴜᴅᴏᴇʀ ᴄᴏᴍᴍᴀɴᴅꜱ</b>

  <i>ᴀᴅᴠᴀɴᴄᴇᴅ ᴛᴏᴏʟꜱ ꜰᴏʀ ᴍᴀɴᴀɢɪɴɢ ʙᴏᴛ ʙᴇʜᴀᴠɪᴏʀ, ᴍᴏɴɪᴛᴏʀɪɴɢ ᴘᴇʀꜰᴏʀᴍᴀɴᴄᴇ, ᴀɴᴅ ᴄᴏɴᴛʀᴏʟʟɪɴɢ ʟᴏɢɢɪɴɢ ᴀɴᴅ ᴀᴜᴛᴏᴍᴀᴛɪᴏɴ.</i>

  <b>ᴄᴏᴍᴍᴀɴᴅꜱ:</b>
  <b>/ᴀᴄᴛɪᴠᴇ</b> - ꜱʜᴏᴡꜱ ᴛᴏᴛᴀʟ ᴀᴄᴛɪᴠᴇ ᴄʜᴀᴛꜱ
  <b>/ᴀᴜᴛᴏʟᴇᴀᴠᴇ</b> - ᴛᴏɢɢʟᴇ ᴀᴜᴛᴏᴍᴀᴛɪᴄ ᴄʜᴀᴛ ʟᴇᴀᴠɪɴɢ
  <b>/ʟᴏɢɢᴇʀ</b> - ᴇɴᴀʙʟᴇ ᴏʀ ᴅɪꜱᴀʙʟᴇ ʟᴏɢɢᴇʀ
  <b>/ꜱᴛᴀᴛꜱ</b> - ᴅɪꜱᴘʟᴀʏ ᴛʜᴇ ʙᴏᴛ & ꜱʏꜱᴛᴇᴍ ꜱᴛᴀᴛꜱ
  <b>/ʟᴏɢꜱ</b> - ɢᴇᴛ ᴛʜᴇ ꜱʏꜱᴛᴇᴍ ʟᴏɢꜱ 

help_admin: |
  🛠 <b>ᴀᴅᴍɪɴ ᴄᴏᴍᴍᴀɴᴅꜱ</b>

  <i>ᴍᴜꜱɪᴄ ᴀɴᴅ ᴘʟᴀʏʙᴀᴄᴋ ᴄᴏɴᴛʀᴏʟ ᴛᴏᴏʟꜱ ꜰᴏʀ ᴀᴅᴍɪɴꜱ ᴛᴏ ʜᴀɴᴅʟᴇ ᴘʟᴀʏʙᴀᴄᴋ ᴇᴀꜱɪʟʏ.</i>

  <b>ᴄᴏᴍᴍᴀɴᴅꜱ:</b>
  <b>/ꜱᴘᴇᴇᴅ</b> - ᴄʜᴀɴɢᴇ ᴘʟᴀʏʙᴀᴄᴋ ꜱᴘᴇᴇᴅ
  <b>/ꜱᴋɪᴘ</b> - ꜱᴋɪᴘ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ ꜱᴏɴɢ
  <b>/ᴘᴀᴜꜱᴇ</b> - ᴘᴀᴜꜱᴇ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ ᴘʟᴀʏʙᴀᴄᴋ
  <b>/ʀᴇꜱᴜᴍᴇ</b> - ʀᴇꜱᴜᴍᴇ ᴘᴀᴜꜱᴇᴅ ᴘʟᴀʏʙᴀᴄᴋ
  <b>/ʀᴇᴘʟᴀʏ</b> - ʀᴇᴘʟᴀʏ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ ꜱᴏɴɢ
  <b>/ᴍᴜᴛᴇ</b> - ᴍᴜᴛᴇ ᴘʟᴀʏʙᴀᴄᴋ
  <b>/ᴜɴᴍᴜᴛᴇ</b> - ᴜɴᴍᴜᴛᴇ ᴘʟᴀʏʙᴀᴄᴋ
  <b>/ꜱᴇᴇᴋ</b> - ꜱᴇᴇᴋ ꜰᴏʀᴡᴀʀᴅ ʙʏ ᴀ ꜰᴇᴡ ꜱᴇᴄᴏɴᴅꜱ
  <b>/ꜱᴇᴇᴋʙᴀᴄᴋ</b> - ꜱᴇᴇᴋ ʙᴀᴄᴋᴡᴀʀᴅ ʙʏ ᴀ ꜰᴇᴡ ꜱᴇᴄᴏɴᴅꜱ
  <b>/ᴊᴜᴍᴘ</b> - ᴊᴜᴍᴘ ᴛᴏ ᴀ ɢɪᴠᴇɴ ᴛɪᴍᴇ ɪɴ ᴛʀᴀᴄᴋ
  <b>/ᴍᴏᴠᴇ</b> - ᴍᴏᴠᴇ ᴀ Qᴜᴇᴜᴇᴅ ᴛʀᴀᴄᴋ ᴛᴏ ᴀɴᴏᴛʜᴇʀ ᴘᴏꜱɪᴛɪᴏɴ
  <b>/ᴄʟᴇᴀʀ</b> - ᴄʟᴇᴀʀ ᴀʟʟ ꜱᴏɴɢꜱ ꜰʀᴏᴍ Qᴜᴇᴜᴇ
  <b>/ʀᴇᴍᴏᴠᴇ</b> - ʀᴇᴍᴏᴠᴇ ᴀ ꜱᴘᴇᴄɪꜰɪᴄ ᴛʀᴀᴄᴋ ꜰʀᴏᴍ Qᴜᴇᴜᴇ
  <b>/ꜱʜᴜꜰꜰʟᴇ</b> - ꜱʜᴜꜰꜰʟᴇ ᴀʟʟ Qᴜᴇᴜᴇᴅ ᴛʀᴀᴄᴋꜱ
  <b>/ʟᴏᴏᴘ</b> - ᴇɴᴀʙʟᴇ ᴏʀ ᴅɪꜱᴀʙʟᴇ ʟᴏᴏᴘɪɴɢ
  <b>/ꜱᴛᴏᴘ</b> - ꜱᴛᴏᴘ ᴘʟᴀʏʙᴀᴄᴋ ᴀɴᴅ ʟᴇᴀᴠᴇ ᴠᴄ
  <b>/ɴᴏᴛʜᴜᴍʙ</b> - ᴇɴᴀʙʟᴇ ᴏʀ ᴅɪꜱᴀʙʟᴇ ᴀʀᴛᴡᴏʀᴋ/ᴛʜᴜᴍʙɴᴀɪʟ ɪɴ ᴘʟᴀʏʙᴀᴄᴋ ᴍᴇꜱꜱᴀɢᴇꜱ

help_public: |
  🌍 <b>ᴘᴜʙʟɪᴄ ᴄᴏᴍᴍᴀɴᴅꜱ</b>

  <i>ꜰᴇᴀᴛᴜʀᴇꜱ ꜰᴏʀ ᴘʟᴀʏɪɴɢ ꜱᴏɴɢꜱ, ᴠɪᴇᴡɪɴɢ Qᴜᴇᴜᴇꜱ, ᴄʜᴇᴄᴋɪɴɢ ʟᴀᴛᴇɴᴄʏ, ᴀɴᴅ ʀᴇᴘᴏʀᴛɪɴɢ ʙᴜɢꜱ.</i>

  <b>ᴄᴏᴍᴍᴀɴᴅꜱ:</b>
  <b>/ᴘʟᴀʏ</b> - ᴘʟᴀʏ ᴀ ꜱᴏɴɢ
  <b>/Qᴜᴇᴜᴇ</b> - ᴠɪᴇᴡ ᴀʟʟ ᴛʀᴀᴄᴋꜱ ᴄᴜʀʀᴇɴᴛʟʏ Qᴜᴇᴜᴇᴅ
  <b>/ᴘɪɴɢ</b> - ᴄʜᴇᴄᴋ ʙᴏᴛ’ꜱ ɴᴇᴛᴡᴏʀᴋ ʟᴀᴛᴇɴᴄʏ
  <b>/ꜱᴛᴀʀᴛ</b> - ꜱᴛᴀʀᴛ ᴛʜᴇ ʙᴏᴛ
  <b>/ʜᴇʟᴘ</b> - ꜱʜᴏᴡ ʜᴇʟᴘ ᴍᴇɴᴜ
  <b>/ʙᴜɢ</b> - ʀᴇᴘᴏʀᴛ ᴀɴ ɪꜱꜱᴜᴇ ᴏʀ ᴘʀᴏʙʟᴇᴍ
  <b>/ᴘᴏꜱɪᴛɪᴏɴ</b> - ꜱʜᴏᴡ ᴄᴜʀʀᴇɴᴛ ᴛʀᴀᴄᴋ’ꜱ ᴛɪᴍᴇꜱᴛᴀᴍᴘ
  <b>/ʀᴇʟᴏᴀᴅ</b> - ʀᴇʟᴏᴀᴅ ᴀᴅᴍɪɴ ᴏʀ ᴄᴀᴄʜᴇ ᴅᴀᴛᴀ
  <b>/ᴊꜱᴏɴ</b> - ꜱʜᴏᴡ ᴍᴇꜱꜱᴀɢᴇ ᴊꜱᴏɴ ꜱᴛʀᴜᴄᴛᴜʀᴇ
  <b>/ꜱᴜᴅᴏʟɪꜱᴛ</b> - ᴠɪᴇᴡ ꜱᴜᴅᴏ ᴜꜱᴇʀ ʟɪꜱᴛ